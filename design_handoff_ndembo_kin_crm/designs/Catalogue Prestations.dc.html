<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
  <style>
    body { margin: 0; background: #F0F2F5; }
    * { box-sizing: border-box; }
  </style>
</helmet>

<div style="font-family: Plus Jakarta Sans, sans-serif; min-height: 100vh; background: #F0F2F5; display: flex; flex-direction: column;">

  <!-- TOPBAR -->
  <div style="background: #fff; border-bottom: 1px solid #E8ECF1; padding: 0 28px; display: flex; align-items: center; height: 60px; gap: 16px; flex-shrink: 0;">
    <div style="background: #07101A; border-radius: 8px; padding: 4px 5px;">
      <img src="assets/logo.png" style="height: 22px; width: auto; display: block;" />
    </div>
    <div style="flex: 1; display: flex; align-items: center; gap: 10px;">
      <span style="font-size: 16px; font-weight: 800; color: #0F172A; letter-spacing: -0.3px;">Catalogue de prestations</span>
      <span style="font-size: 12px; font-weight: 700; background: #07101A; color: #FCD116; padding: 2px 9px; border-radius: 20px;">{{ totalCount }}</span>
    </div>
    <div style="display: flex; gap: 8px; align-items: center;">
      <div style="position: relative;">
        <span style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-family: Material Icons Outlined; font-size: 17px; color: #94A3B8; pointer-events: none; display: inline-flex; line-height: 1;">search</span>
        <input type="text" placeholder="Rechercher une prestation…" value="{{ search }}" onInput="{{ onSearch }}"
          style="padding: 9px 14px 9px 38px; border: 1.5px solid #E2E8F0; border-radius: 10px; font-size: 13px; font-family: Plus Jakarta Sans, sans-serif; color: #0F172A; outline: none; background: #F8FAFC; width: 240px;"
          style-focus="border-color: #3A6B84; background: #fff; box-shadow: 0 0 0 3px rgba(58,107,132,0.08);" />
      </div>
      <button onClick="{{ onAdd }}" style="padding: 9px 18px; background: #07101A; color: #FCD116; font-size: 13px; font-weight: 700; border: none; border-radius: 10px; cursor: pointer; font-family: Plus Jakarta Sans, sans-serif; display: flex; align-items: center; gap: 7px; white-space: nowrap;" style-hover="background: #132730;">
        <span style="font-family: Material Icons Outlined; font-size: 16px; display: inline-flex; line-height: 1;">add</span>
        Nouvelle prestation
      </button>
    </div>
  </div>

  <!-- FILTRES CATÉGORIE -->
  <div style="display: flex; gap: 8px; padding: 20px 28px 0; flex-wrap: wrap;">
    <sc-for list="{{ catFilters }}" as="c" hint-placeholder-count="5">
      <div onClick="{{ c.onClick }}" style="{{ c.style }}">{{ c.label }} <span style="opacity: 0.6;">{{ c.count }}</span></div>
    </sc-for>
  </div>

  <!-- GRILLE -->
  <div style="padding: 18px 28px 32px; flex: 1;">
    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px;">
      <sc-for list="{{ prestations }}" as="p" hint-placeholder-count="9">
        <div style="background: #fff; border: 1px solid #E2E8F0; border-radius: 16px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.04); display: flex; flex-direction: column; gap: 12px;" style-hover="border-color: #CBD5E1; box-shadow: 0 4px 14px rgba(0,0,0,0.06);">
          <div style="display: flex; align-items: flex-start; justify-content: space-between;">
            <div style="{{ p.iBox }}">
              <span style="font-family: Material Icons Outlined; font-size: 20px; display: inline-flex; line-height: 1; color: {{ p.iColor }};">{{ p.icon }}</span>
            </div>
            <span style="{{ p.catStyle }}">{{ p.categorie }}</span>
          </div>
          <div>
            <div style="font-size: 15px; font-weight: 700; color: #0F172A; line-height: 1.3;">{{ p.nom }}</div>
            <div style="font-size: 12px; color: #94A3B8; margin-top: 5px; line-height: 1.5;">{{ p.description }}</div>
          </div>
          <div style="display: flex; align-items: flex-end; justify-content: space-between; margin-top: auto; padding-top: 12px; border-top: 1px solid #F1F5F9;">
            <div>
              <div style="font-size: 20px; font-weight: 800; color: #059669; letter-spacing: -0.4px; font-family: monospace;">{{ p.prixFmt }}</div>
              <div style="font-size: 10px; color: #94A3B8; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 1px;">{{ p.unite }}</div>
            </div>
            <div style="display: flex; gap: 6px;">
              <div style="width: 30px; height: 30px; border-radius: 8px; background: #F1F5F9; border: 1px solid #E2E8F0; display: flex; align-items: center; justify-content: center; cursor: pointer;" style-hover="background: #EFF6FF; border-color: #BFDBFE;">
                <span style="font-family: Material Icons Outlined; font-size: 15px; color: #64748B; display: inline-flex; line-height: 1;">edit</span>
              </div>
            </div>
          </div>
        </div>
      </sc-for>
    </div>
    <sc-if value="{{ noResults }}" hint-placeholder-val="{{ false }}">
      <div style="padding: 56px 20px; text-align: center; background: #fff; border: 1px solid #E2E8F0; border-radius: 16px;">
        <span style="font-family: Material Icons Outlined; font-size: 42px; color: #CBD5E1; display: block; margin-bottom: 10px;">search_off</span>
        <div style="font-size: 14px; font-weight: 700; color: #334155;">Aucune prestation trouvée</div>
        <div style="font-size: 13px; color: #94A3B8; margin-top: 4px;">Essayez un autre mot-clé ou une autre catégorie.</div>
      </div>
    </sc-if>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;: {&quot;width&quot;: 1280, &quot;height&quot;: 860}}">
class Component extends DCLogic {
  state = { search:'', cat:'' };

  _cats = {
    'Représentation': { color:'#2563EB', bg:'#EFF6FF', icon:'badge' },
    'Coaching': { color:'#6D28D9', bg:'#F5F3FF', icon:'sports' },
    'Événementiel': { color:'#B45309', bg:'#FEF9EE', icon:'celebration' },
    'Scouting': { color:'#059669', bg:'#F0FDF4', icon:'travel_explore' },
    'Image': { color:'#BE123C', bg:'#FFF1F2', icon:'photo_camera' },
  };

  data = [
    { id:1, nom:'Représentation sportive internationale', categorie:'Représentation', prix:5000, unite:'/ saison', description:'Mandat de représentation et gestion de carrière à l\u0027international.' },
    { id:2, nom:'Négociation de transfert', categorie:'Représentation', prix:8500, unite:'/ opération', description:'Négociation et finalisation d\u0027un transfert vers un club partenaire.' },
    { id:3, nom:'Coaching tactique', categorie:'Coaching', prix:800, unite:'/ session', description:'Séance individuelle d\u0027encadrement technique et tactique.' },
    { id:4, nom:'Préparation physique', categorie:'Coaching', prix:600, unite:'/ session', description:'Programme de préparation physique personnalisé.' },
    { id:5, nom:'Organisation d\u0027événement sportif', categorie:'Événementiel', prix:6200, unite:'/ événement', description:'Logistique complète d\u0027un tournoi ou match de gala.' },
    { id:6, nom:'Scouting & recrutement', categorie:'Scouting', prix:4500, unite:'/ mission', description:'Détection et évaluation de jeunes talents sur le terrain.' },
    { id:7, nom:'Production de contenu image', categorie:'Image', prix:1500, unite:'/ shooting', description:'Shooting photo/vidéo pour la communication de l\u0027athlète.' },
    { id:8, nom:'Gestion de partenariat sponsor', categorie:'Représentation', prix:3200, unite:'/ contrat', description:'Mise en relation et suivi d\u0027un contrat de sponsoring.' },
    { id:9, nom:'Stage de détection', categorie:'Scouting', prix:2800, unite:'/ stage', description:'Organisation d\u0027un stage de détection multi-clubs.' },
  ];

  _fmt(n) { return '$'+n.toLocaleString('fr-FR'); }

  renderVals() {
    const s = this.state;
    const filtered = this.data.filter(p => {
      const q = s.search.toLowerCase();
      return (!q || p.nom.toLowerCase().includes(q) || p.description.toLowerCase().includes(q)) && (!s.cat || p.categorie===s.cat);
    });

    const catNames = Object.keys(this._cats);
    const chipBase = { padding:'7px 15px', borderRadius:20, fontSize:12.5, fontWeight:600, cursor:'pointer', display:'flex', alignItems:'center', gap:6, border:'1.5px solid transparent' };
    const catFilters = [{ id:'', label:'Toutes', count:this.data.length }].concat(
      catNames.map(c => ({ id:c, label:c, count:this.data.filter(p=>p.categorie===c).length }))
    ).map(c => ({
      label:c.label, count:c.count,
      onClick:()=>this.setState({cat:c.id}),
      style: s.cat===c.id
        ? { ...chipBase, background:'#07101A', color:'#FCD116' }
        : { ...chipBase, background:'#fff', color:'#475569', border:'1.5px solid #E2E8F0' },
    }));

    const prestations = filtered.map(p => {
      const c = this._cats[p.categorie] || this._cats['Représentation'];
      return {
        ...p,
        prixFmt:this._fmt(p.prix),
        icon:c.icon, iColor:c.color,
        iBox:{ width:40, height:40, borderRadius:11, background:c.bg, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 },
        catStyle:{ fontSize:10, fontWeight:700, color:c.color, background:c.bg, padding:'3px 9px', borderRadius:20, display:'inline-block', whiteSpace:'nowrap' },
      };
    });

    return {
      search:s.search, totalCount:this.data.length, catFilters, prestations,
      noResults: prestations.length===0,
      onSearch:(e)=>this.setState({search:e.target.value}),
      onAdd:()=>alert('→ Nouvelle prestation'),
    };
  }
}
</script>
</body>
</html>
